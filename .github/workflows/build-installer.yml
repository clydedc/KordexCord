name: Build Kordexcord Installer

on:
  # Build manuellement depuis l’onglet Actions
  workflow_dispatch:

  # (Désactivé pour l’instant) Build automatique à chaque push
  # push:
  #   branches:
  #     - main

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Skip (no kordexcord-installer project yet)
        run: |
          echo "Aucun projet kordexcord-installer dans le dépôt."
          echo "Ce workflow est un placeholder et ne fait rien pour l’instant."