name: Build Kordexcord Installer

on:
  # Build manuellement depuis l’onglet Actions
  workflow_dispatch:

  # Build automatiquement à chaque push sur main et à chaque tag v*
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # pas de cache pnpm ici pour éviter d'appeler pnpm avant installation

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # ne pas fixer la version ici, pnpm/action-setup utilisera
          # automatiquement la version déclarée dans package.json (pnpm@10.22.0)
          run_install: false

      - name: Install dependencies
        run: pnpm install
        working-directory: kordexcord-installer

      - name: Build installer
        run: pnpm run dist
        working-directory: kordexcord-installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KordexcordCli
          path: |
            kordexcord-installer/dist_build/**/*.exe