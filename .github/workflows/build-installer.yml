name: Build Kordexcord Installer

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: kordexcord-installer/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          # lit automatiquement la version dans package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: kordexcord-installer

      - name: Build installer
        run: pnpm run dist
        working-directory: kordexcord-installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KordexcordCli
          path: kordexcord-installer/dist_build/**/*.exe