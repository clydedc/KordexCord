name: Build Kordexcord installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install
        working-directory: kordexcord-installer

      - name: Build installer
        run: pnpm run dist
        working-directory: kordexcord-installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KordexcordCli
          path: kordexcord-installer/dist_build/**