name: Build Kordexcord CLI

on:
  # Build + publish l'exe à chaque release GitHub
  release:
    types: [published]

jobs:
  build-windows-cli:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Kordexcord CLI exe
        run: pnpm run build:exe

      - name: Vérifier que l'exe existe
        run: |
          if (!(Test-Path 'dist/Installer/KordexcordCli.exe')) {
            Write-Error 'dist/Installer/KordexcordCli.exe est introuvable après build:exe'
          }

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Installer/KordexcordCli.exe